<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Image</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
        }

        .card {
            background-color: #1e1e1e;
            border: none;
        }

        .btn-primary {
            background-color: #6a11cb;
            border-color: #6a11cb;
        }

        .btn-primary:hover {
            background-color: #5a0fb5;
            border-color: #5a0fb5;
        }

        .generated-image {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-lg">
                    <div class="card-header bg-dark text-center">
                        <h1 class="h3">Generated Image</h1>
                    </div>
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <img src="data:image/png;base64,{{ image }}" alt="Generated Image" class="generated-image">
                        </div>
                        <div class="mb-3">
                            <h5>Prompt:</h5>
                            <p class="bg-dark p-3 rounded">{{ prompt }}</p>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/" class="btn btn-secondary">Generate Another</a>
                            <a href="/download/{{ image_id }}" class="btn btn-primary" download>Download Image</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
